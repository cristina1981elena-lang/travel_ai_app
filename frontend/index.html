<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Travel AI</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#eef2ff,#f8fafc);
    padding: 40px;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    background: linear-gradient(135deg,#6366f1,#4f46e5);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    transform: translateY(-1px);
    box-shadow:0 5px 15px rgba(99,102,241,0.3);
}

.resultado {
    border-left: 5px solid #6366f1;
    background: #eef2ff;
    padding: 15px;
    margin-top: 10px;
    border-radius:8px;
}

.error {
    color: red;
    font-weight: bold;
}

.panel {
    background:#eef2ff;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌍 Travel AI</h1>

<div id="panel_usuario" class="panel">
    <b>👤 Usuario:</b> <span id="user_email">-</span><br>
    <b>💼 Plan:</b> <span id="user_plan">-</span><br>
    <b>📊 Consultas:</b> <span id="user_consultas">-</span>
</div>

<h3>Registro</h3>
<input type="email" id="reg_email" placeholder="Email">
<input type="password" id="reg_password" placeholder="Contraseña">
<button onclick="registro()">Crear cuenta</button>
<p id="reg_msg"></p>

<hr>

<h3>Login</h3>
<input type="email" id="login_email" placeholder="Email">
<input type="password" id="login_password" placeholder="Contraseña">
<button onclick="login()">Iniciar sesión</button>
<p id="login_msg"></p>

<button onclick="logout()">Cerrar sesión</button>

<button onclick="comprarPro()">💳 Comprar PRO (9.99€)</button>
<p id="pago_msg"></p>

<hr>

<h3>Buscar viaje</h3>

<input type="number" id="presupuesto" placeholder="Presupuesto (€)">

<select id="tipo">
    <option value="playa">Playa</option>
    <option value="cultura">Cultura</option>
    <option value="aventura">Aventura</option>
    <option value="fiesta">Fiesta</option>
    <option value="naturaleza">Naturaleza</option>
    <option value="relax">Relax</option>
</select>

<button onclick="buscar()">Buscar destino</button>

<p id="uso"></p>
<p id="error" class="error"></p>

<div id="resultados"></div>

</div>

<script>

// 🔥 IMPORTANTE: TU BACKEND EN RENDER
const API_URL = "https://travel-ai-app-1-fx7e.onrender.com";

let usuario_logueado = null;


// 🔁 RECUPERAR SESIÓN
window.onload = function() {
    let usuario_guardado = localStorage.getItem("usuario");

    if (usuario_guardado) {
        usuario_logueado = usuario_guardado;
        document.getElementById("login_msg").innerHTML = "✅ Sesión recuperada";
        cargarPerfil();
    }
};


// 👤 PERFIL
async function cargarPerfil() {

    if (!usuario_logueado) return;

    try {
        let res = await fetch(`${API_URL}/perfil?email=${usuario_logueado}`);
        let data = await res.json();

        document.getElementById("user_email").innerHTML = data.email;
        document.getElementById("user_plan").innerHTML = data.plan.toUpperCase();
        document.getElementById("user_consultas").innerHTML = data.consultas;

    } catch (e) {
        console.log("Error cargando perfil");
    }
}


// 🔐 REGISTRO
async function registro() {

    let email = document.getElementById("reg_email").value;
    let password = document.getElementById("reg_password").value;
    let msg = document.getElementById("reg_msg");

    msg.innerHTML = "";

    if (!email || !password) {
        msg.innerHTML = "❌ Completa todos los campos";
        return;
    }

    try {
        let res = await fetch(`${API_URL}/registro?email=${email}&password=${password}`, {
            method: "POST"
        });

        let data = await res.json();

        if (data.detail) {
            msg.innerHTML = "❌ " + data.detail;
            return;
        }

        msg.innerHTML = "✅ Usuario creado";

        document.getElementById("login_email").value = email;
        document.getElementById("login_password").value = password;

    } catch (e) {
        msg.innerHTML = "❌ Error conectando con Render";
    }
}


// 🔐 LOGIN
async function login() {

    let email = document.getElementById("login_email").value;
    let password = document.getElementById("login_password").value;
    let msg = document.getElementById("login_msg");

    msg.innerHTML = "";

    try {
        let res = await fetch(`${API_URL}/login?email=${email}&password=${password}`, {
            method: "POST"
        });

        let data = await res.json();

        if (data.detail) {
            msg.innerHTML = "❌ " + data.detail;
            return;
        }

        usuario_logueado = data.usuario.email;
        localStorage.setItem("usuario", usuario_logueado);

        msg.innerHTML = "✅ Login correcto";

        cargarPerfil();

    } catch (e) {
        msg.innerHTML = "❌ Error conectando con Render";
    }
}


// 🔓 LOGOUT
function logout() {
    localStorage.removeItem("usuario");
    usuario_logueado = null;

    document.getElementById("login_msg").innerHTML = "Sesión cerrada";

    document.getElementById("user_email").innerHTML = "-";
    document.getElementById("user_plan").innerHTML = "-";
    document.getElementById("user_consultas").innerHTML = "-";
}


// 💳 PAGO
async function comprarPro() {

    let msg = document.getElementById("pago_msg");
    msg.innerHTML = "";

    if (!usuario_logueado) {
        msg.innerHTML = "❌ Debes iniciar sesión";
        return;
    }

    msg.innerHTML = "💳 Procesando pago...";

    setTimeout(async () => {

        try {
            await fetch(`${API_URL}/upgrade?email=${usuario_logueado}`, {
                method: "POST"
            });

            msg.innerHTML = "✅ Ahora eres PRO 🚀";

            cargarPerfil();

        } catch (e) {
            msg.innerHTML = "❌ Error en el pago";
        }

    }, 2000);
}


// 🔍 BUSCAR
async function buscar() {

    let presupuesto = document.getElementById("presupuesto").value;
    let tipo = document.getElementById("tipo").value;

    let resultados = document.getElementById("resultados");
    let error = document.getElementById("error");
    let uso = document.getElementById("uso");

    resultados.innerHTML = "";
    error.innerHTML = "";
    uso.innerHTML = "";

    if (!usuario_logueado) {
        error.innerHTML = "Debes iniciar sesión primero";
        return;
    }

    try {
        let res = await fetch(`${API_URL}/recomendar?presupuesto=${presupuesto}&tipo=${tipo}&email=${usuario_logueado}`);
        let data = await res.json();

        if (data.error) {
            error.innerHTML = data.error;
            return;
        }

        if (data.plan === "free") {
            uso.innerHTML = `Consultas: ${data.consultas_usadas}/3`;
        } else {
            uso.innerHTML = "🚀 Usuario PRO";
        }

        data.recomendaciones.forEach(d => {
            resultados.innerHTML += `
                <div class="resultado">
                    <b>${d.ciudad}</b> (${d.pais})<br>
                    Precio: ${d.precio_vuelo}€
                </div>
            `;
        });

        cargarPerfil();

    } catch (e) {
        error.innerHTML = "❌ Error conectando con Render";
    }
}

</script>

</body>
</html>
